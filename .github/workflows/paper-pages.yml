name: Publish paper (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - 'papers/**'
      - 'benchmarks/results/**'
      - 'CITATION.cff'
      - 'scripts/sync-paper-public.sh'
      - '.github/workflows/paper-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: paper-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Sync public paper site
        run: bash scripts/sync-paper-public.sh

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: papers/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
