name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. v0.4.2) — used only for manual runs without a tag"
        required: false
        default: ""

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/voxmastery/fluctlightdb

jobs:
  build-binaries:
    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: linux-x86_64
            cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: linux-aarch64
            cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: macos-arm64
            cross: false
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross linker
        if: matrix.cross
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build fluctlight CLI
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          cargo build --release -p fluctlight-cli --target ${{ matrix.target }}

      - name: Package tarball
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            VERSION="${VERSION#v}"
          else
            VERSION="$(grep '^version' sdks/python/pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          fi
          NAME="fluctlight-${VERSION}-${{ matrix.artifact }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/fluctlight" "dist/fluctlight"
          chmod +x "dist/fluctlight"
          tar -C dist -czf "${NAME}.tar.gz" fluctlight
          sha256sum "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            fluctlight-*.tar.gz
            fluctlight-*.tar.gz.sha256

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: meta
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            VERSION="${VERSION#v}"
          else
            VERSION="$(grep '^version' sdks/python/pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tags=${IMAGE}:${VERSION},${IMAGE}:latest" >> "$GITHUB_OUTPUT"
        env:
          IMAGE: ${{ env.IMAGE }}

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}

  release:
    name: GitHub Release
    needs: [build-binaries, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Resolve tag and version
        id: tag
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
          elif [ -n "${{ inputs.version }}" ]; then
            TAG="${{ inputs.version }}"
            [[ "$TAG" == v* ]] || TAG="v${TAG}"
          else
            TAG="v$(grep '^version' sdks/python/pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          fi
          echo "name=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: artifacts/**/*
          body: |
            ## Install

            **Python client:** `pip install fluctlightdb==${{ steps.tag.outputs.version }}`

            **Docker:**
            ```bash
            docker pull ghcr.io/voxmastery/fluctlightdb:${{ steps.tag.outputs.version }}
            docker run -p 8792:8792 \
              -e FLUCTLIGHT_API_KEYS=default:your-secret-key:write \
              -v fluctlight-data:/data \
              ghcr.io/voxmastery/fluctlightdb:${{ steps.tag.outputs.version }}
            ```

            **Binary:** download the tarball for your platform below, extract, and run `./fluctlight serve`.

            See [docs/DOCKER.md](https://github.com/voxmastery/FluctlightDB/blob/main/docs/DOCKER.md).
